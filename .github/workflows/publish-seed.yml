name: Publish Seed (Manual)

on:
  workflow_dispatch:
    inputs:
      source_path:
        description: "Repository path to source file to encode"
        required: true
        type: string
      seed_path:
        description: "Output path for generated seed"
        required: true
        type: string
        default: ".artifacts/publish/seed.sbd"
      genome_path:
        description: "Genome path used during encode/verify"
        required: true
        type: string
        default: ".artifacts/publish/genome.db"
      chunker:
        description: "Chunker for encode"
        required: true
        type: choice
        options:
          - cdc_buzhash
          - cdc_rabin
          - fixed
        default: cdc_buzhash
      portable:
        description: "Generate portable seed"
        required: true
        type: boolean
        default: true
      manifest_private:
        description: "Enable --manifest-private"
        required: true
        type: boolean
        default: true
      encrypt:
        description: "Enable --encrypt (requires SB_ENCRYPTION_KEY secret)"
        required: true
        type: boolean
        default: false
      kubo_version:
        description: "Kubo version to install when dry_run=false"
        required: true
        type: string
        default: "0.32.1"
      pin:
        description: "Pin after publish"
        required: true
        type: boolean
        default: false
      dry_run:
        description: "Dry-run only (safe default)"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

env:
  UV_CACHE_DIR: .uv-cache

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
      - name: Validate source path
        run: |
          if [ ! -f "${{ inputs.source_path }}" ]; then
            echo "::error::source file not found: ${{ inputs.source_path }}"
            echo "next_action: provide a valid repository path to an existing input file."
            exit 1
          fi
      - name: Install dependencies
        run: uv sync --no-editable --extra dev
      - name: Validate encryption key
        if: ${{ inputs.encrypt }}
        env:
          SB_ENCRYPTION_KEY: ${{ secrets.SB_ENCRYPTION_KEY }}
        run: |
          if [ -z "${SB_ENCRYPTION_KEY}" ]; then
            echo "::error::encrypt=true but secret SB_ENCRYPTION_KEY is missing."
            echo "next_action: configure SB_ENCRYPTION_KEY secret, or rerun with encrypt=false."
            exit 1
          fi
      - name: Prepare output paths
        id: prep
        run: |
          seed_dir="$(dirname "${{ inputs.seed_path }}")"
          genome_dir="$(dirname "${{ inputs.genome_path }}")"
          mkdir -p "${seed_dir}" "${genome_dir}"
          echo "seed_path=${{ inputs.seed_path }}" >> "$GITHUB_OUTPUT"
          echo "genome_path=${{ inputs.genome_path }}" >> "$GITHUB_OUTPUT"
      - name: Encode seed
        env:
          SB_ENCRYPTION_KEY: ${{ secrets.SB_ENCRYPTION_KEY }}
        run: |
          portable_flag="--portable"
          if [ "${{ inputs.portable }}" != "true" ]; then
            portable_flag="--no-portable"
          fi

          cmd=(
            uv run --no-sync --no-editable seedbraid encode "${{ inputs.source_path }}"
            --genome "${{ steps.prep.outputs.genome_path }}"
            --out "${{ steps.prep.outputs.seed_path }}"
            --chunker "${{ inputs.chunker }}"
            --avg 65536 --min 16384 --max 262144
            --learn "${portable_flag}"
            --compression zlib
          )
          if [ "${{ inputs.manifest_private }}" = "true" ]; then
            cmd+=(--manifest-private)
          fi
          if [ "${{ inputs.encrypt }}" = "true" ]; then
            cmd+=(--encrypt)
          fi

          printf 'encode_command='
          printf '%q ' "${cmd[@]}"
          echo
          "${cmd[@]}"
      - name: Verify generated seed (strict)
        env:
          SB_ENCRYPTION_KEY: ${{ secrets.SB_ENCRYPTION_KEY }}
        run: |
          cmd=(
            uv run --no-sync --no-editable seedbraid verify "${{ steps.prep.outputs.seed_path }}"
            --genome "${{ steps.prep.outputs.genome_path }}"
            --strict
          )
          if [ "${{ inputs.encrypt }}" = "true" ]; then
            cmd+=(--encryption-key "${SB_ENCRYPTION_KEY}")
          fi

          printf 'verify_command='
          printf '%q ' "${cmd[@]}"
          echo
          "${cmd[@]}"
      - name: Upload generated seed artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: generated-seed
          path: ${{ steps.prep.outputs.seed_path }}
          if-no-files-found: warn
      - name: Verify Kubo release tag signature
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          python - "${{ inputs.kubo_version }}" <<'PY'
          import json
          import sys
          import urllib.error
          import urllib.request

          version = sys.argv[1]
          tag_ref = f"v{version}"
          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "seedbraid-ci-kubo-verifier",
          }

          def fetch(url: str) -> dict:
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      return json.load(resp)
              except urllib.error.HTTPError as exc:
                  print(f"::error::failed to fetch {url}: HTTP {exc.code}")
                  raise SystemExit(1)
              except urllib.error.URLError as exc:
                  print(f"::error::failed to fetch {url}: {exc.reason}")
                  raise SystemExit(1)

          ref_url = f"https://api.github.com/repos/ipfs/kubo/git/ref/tags/{tag_ref}"
          ref_obj = fetch(ref_url)
          obj = ref_obj.get("object") or {}
          if obj.get("type") != "tag":
              print(
                  "::error::kubo tag ref does not point to an annotated tag; "
                  f"got type={obj.get('type')!r}"
              )
              print(
                  "next_action: use a released kubo_version with a signed annotated tag."
              )
              raise SystemExit(1)

          tag_sha = obj.get("sha")
          if not isinstance(tag_sha, str) or not tag_sha:
              print("::error::missing tag object sha in GitHub tag ref response.")
              raise SystemExit(1)

          tag_url = f"https://api.github.com/repos/ipfs/kubo/git/tags/{tag_sha}"
          tag_obj = fetch(tag_url)
          if tag_obj.get("tag") != tag_ref:
              print("::error::kubo tag name mismatch in GitHub tag object.")
              print(f"expected={tag_ref} actual={tag_obj.get('tag')}")
              raise SystemExit(1)

          verification = tag_obj.get("verification") or {}
          verified = bool(verification.get("verified"))
          reason = str(verification.get("reason") or "")
          if not verified or reason != "valid":
              print("::error::kubo tag signature is not valid according to GitHub API.")
              print(f"verified={verified} reason={reason}")
              print(
                  "next_action: use a trusted kubo_version with valid signature "
                  "verification status."
              )
              raise SystemExit(1)

          tagger = tag_obj.get("tagger") or {}
          print(
              "kubo_tag_signature_verification="
              f"PASS tag={tag_ref} "
              f"tagger={tagger.get('name', 'unknown')} "
              f"email={tagger.get('email', 'unknown')}"
          )
          PY
      - name: Install IPFS CLI (Kubo)
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          kubo_version="${{ inputs.kubo_version }}"
          archive="kubo_v${kubo_version}_linux-amd64.tar.gz"
          url="https://dist.ipfs.tech/kubo/v${kubo_version}/${archive}"
          checksum_url="${url}.sha512"

          if ! curl -fsSL "${url}" -o /tmp/kubo.tgz; then
            echo "::error::failed to download Kubo from ${url}"
            echo "next_action: set kubo_version to an available release and retry."
            exit 1
          fi
          if ! curl -fsSL "${checksum_url}" -o /tmp/kubo.tgz.sha512; then
            echo "::error::failed to download Kubo checksum from ${checksum_url}"
            echo "next_action: check release assets for the selected kubo_version and retry."
            exit 1
          fi

          expected_sha="$(awk 'NF {print $1; exit}' /tmp/kubo.tgz.sha512 | tr -d '\r')"
          if [ -z "${expected_sha}" ]; then
            echo "::error::checksum file is empty or malformed: ${checksum_url}"
            echo "next_action: choose a valid kubo_version and retry."
            exit 1
          fi

          if command -v sha512sum >/dev/null 2>&1; then
            actual_sha="$(sha512sum /tmp/kubo.tgz | awk '{print $1}')"
          elif command -v shasum >/dev/null 2>&1; then
            actual_sha="$(shasum -a 512 /tmp/kubo.tgz | awk '{print $1}')"
          else
            echo "::error::no SHA-512 checksum tool available on runner."
            echo "next_action: install coreutils/perl digest tools, then retry."
            exit 1
          fi

          if [ "${actual_sha}" != "${expected_sha}" ]; then
            echo "::error::Kubo checksum mismatch."
            echo "expected=${expected_sha}"
            echo "actual=${actual_sha}"
            echo "next_action: stop release and investigate artifact integrity."
            exit 1
          fi

          tar -xzf /tmp/kubo.tgz -C /tmp
          mkdir -p "${HOME}/.local/bin"
          install -m 0755 /tmp/kubo/ipfs "${HOME}/.local/bin/ipfs"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          "${HOME}/.local/bin/ipfs" --version
      - name: Start kubo daemon
        if: ${{ !inputs.dry_run }}
        run: |
          ipfs init
          ipfs daemon &
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:5001/api/v0/version > /dev/null && break
            sleep 0.5
          done
        env:
          IPFS_PATH: /tmp/ipfs-publish
      - name: Dry-run publish command
        if: ${{ inputs.dry_run }}
        run: |
          pin_flag="--no-pin"
          if [ "${{ inputs.pin }}" = "true" ]; then
            pin_flag="--pin"
          fi

          echo "dry_run=true"
          echo "encode_and_verify=completed"
          echo "Would run:"
          echo "uv run --no-sync --no-editable seedbraid publish \"${{ steps.prep.outputs.seed_path }}\" ${pin_flag}"
      - name: Publish to IPFS
        id: publish
        if: ${{ !inputs.dry_run }}
        run: |
          pin_flag="--no-pin"
          if [ "${{ inputs.pin }}" = "true" ]; then
            pin_flag="--pin"
          fi

          cid="$(uv run --no-sync --no-editable seedbraid publish "${{ steps.prep.outputs.seed_path }}" ${pin_flag})"
          echo "cid=${cid}" >> "$GITHUB_OUTPUT"
        env:
          IPFS_PATH: /tmp/ipfs-publish
          SB_KUBO_API: http://127.0.0.1:5001/api/v0
      - name: Publish result
        if: ${{ !inputs.dry_run }}
        run: |
          echo "Published CID: ${{ steps.publish.outputs.cid }}"
