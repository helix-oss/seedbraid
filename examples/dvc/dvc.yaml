stages:
  encode:
    cmd: ./scripts/encode_seed.sh
    deps:
      - ./data/input.bin
      - ./scripts/encode_seed.sh
    outs:
      - ./artifacts/seed/current.sbd
      - ./artifacts/genome/genome.sqlite
      - ./artifacts/genome/snapshot.sgs
  verify:
    cmd: ./scripts/verify_seed.sh
    deps:
      - ./scripts/verify_seed.sh
      - ./artifacts/seed/current.sbd
      - ./artifacts/genome/genome.sqlite
    outs:
      - ./artifacts/metadata/verify.ok
  fetch:
    cmd: ./scripts/fetch_seed.sh
    deps:
      - ./scripts/fetch_seed.sh
      - ./artifacts/seed/current.sbd
      - ./artifacts/metadata/verify.ok
    outs:
      - ./artifacts/metadata/seed.cid
      - ./artifacts/fetched/current.sbd
